{% extends 'base.html' %}
{% block title %}{{ action }} Assignment - LMS{% endblock %}
{% block content %}
<div class="auth-card" style="max-width:600px;">
    <h2>{{ action }} Assignment</h2>
    <p style="color:var(--text-muted); margin-bottom:1.5rem;">Course: <strong>{{ course.course_name }}</strong></p>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="assignment_name">Assignment Title *</label>
            <input type="text" id="assignment_name" name="assignment_name" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="description">Description / Instructions</label>
            <textarea id="description" name="description" class="form-control" rows="4" style="resize:vertical;"></textarea>
        </div>
        <div class="form-group">
            <label for="due_date">Due Date (optional)</label>
            <input type="date" id="due_date" name="due_date" class="form-control">
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:1.5rem;">
            <a href="{% url 'course_detail' course.uuid %}" class="btn btn-outline">Cancel</a>
            <button type="submit" class="btn btn-primary">{{ action }} Assignment</button>
        </div>
    </form>
</div>
{% endblock %}
