{% extends 'base.html' %}

{% block title %}Add Content - LMS{% endblock %}

{% block content %}
<div class="auth-card" style="max-width:600px;">
    <h2>Add Content</h2>
    <p style="color:var(--text-muted); margin-bottom:1.5rem;">
        Module: <strong>{{ module.module_name }}</strong> &bull; Course: <strong>{{ module.course.course_name }}</strong>
    </p>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label for="title">Content Title *</label>
            <input type="text" id="title" name="title" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="content_type">Content Type *</label>
            <select id="content_type" name="content_type" class="form-control" onchange="updateAccept(this.value)" required>
                <option value="">-- Select Type --</option>
                <option value="video">🎬 Video</option>
                <option value="pdf">📄 PDF</option>
            </select>
        </div>
        <div class="form-group">
            <label for="content_file">Upload File *</label>
            <input type="file" id="content_file" name="content_file" class="form-control" required>
            <small style="color:var(--text-muted);">Video: MP4, WebM, OGG &bull; PDF: .pdf</small>
        </div>
        <div class="form-group">
            <label for="order">Order</label>
            <input type="number" id="order" name="order" class="form-control" value="0" min="0">
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:1.5rem;">
            <a href="{% url 'course_detail' module.course.uuid %}" class="btn btn-outline">Cancel</a>
            <button type="submit" class="btn btn-primary">Upload Content</button>
        </div>
    </form>
</div>

<script>
function updateAccept(type) {
    const fileInput = document.getElementById('content_file');
    if (type === 'video') {
        fileInput.setAttribute('accept', 'video/mp4,video/webm,video/ogg');
    } else if (type === 'pdf') {
        fileInput.setAttribute('accept', 'application/pdf');
    } else {
        fileInput.removeAttribute('accept');
    }
}
</script>
{% endblock %}
