{% extends 'base.html' %}

{% block title %}Reset Password - LMS{% endblock %}

{% block content %}
<div class="auth-card">
    <h2>Reset Password</h2>
    <p style="margin-bottom: 1.5rem; color: var(--text-muted); text-align: center;">
        Enter your email address and we will send you a link to reset your password.
    </p>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_email">Email address:</label>
            <input type="email" name="email" maxlength="254" id="id_email" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
    </form>
    <div class="auth-links">
        <p><a href="{% url 'login' %}">Back to login</a></p>
    </div>
</div>
{% endblock %}
